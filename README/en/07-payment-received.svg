<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'Segoe UI', Roboto, Arial, sans-serif">
  <rect width="800" height="480" fill="#f5f5f5" rx="8"/>

  <!-- Passenger App - Back to home -->
  <g transform="translate(20, 20)">
    <rect width="370" height="440" fill="#fff" rx="12" stroke="#e0e0e0"/>
    <rect width="370" height="50" fill="#4CAF93" rx="12 12 0 0"/>
    <rect y="38" width="370" height="12" fill="#4CAF93"/>
    <text x="185" y="32" text-anchor="middle" fill="#fff" font-size="16" font-weight="600">Online Taxi — Passenger</text>
    <!-- Map -->
    <rect x="15" y="60" width="340" height="240" fill="#e8f5e9" rx="6" stroke="#c8e6c9"/>
    <text x="185" y="150" text-anchor="middle" fill="#81c784" font-size="13">Map View</text>
    <!-- Destination marker -->
    <rect x="130" y="170" width="110" height="28" fill="#f44336" rx="4"/>
    <text x="185" y="189" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Drop off here</text>
    <!-- Addresses -->
    <circle cx="30" cy="330" r="5" fill="#4CAF93"/>
    <text x="45" y="334" fill="#333" font-size="11">Wangjing West Rd, Chaoyang, Beijing</text>
    <circle cx="30" cy="355" r="5" fill="#f44336"/>
    <text x="45" y="359" fill="#333" font-size="11">Nanhu Zhongyuan #316, Bldg 3, Rm 301-07</text>
    <!-- Request ride button -->
    <rect x="30" y="385" width="310" height="45" fill="#4CAF93" rx="8"/>
    <text x="185" y="413" text-anchor="middle" fill="#fff" font-size="15" font-weight="600">Request Ride</text>
  </g>

  <!-- Driver App - Payment received -->
  <g transform="translate(410, 20)">
    <rect width="370" height="440" fill="#fff" rx="12" stroke="#e0e0e0"/>
    <rect width="370" height="50" fill="#4CAF93" rx="12 12 0 0"/>
    <rect y="38" width="370" height="12" fill="#4CAF93"/>
    <text x="185" y="32" text-anchor="middle" fill="#fff" font-size="16" font-weight="600">Online Taxi — Driver</text>
    <!-- Waiting for orders info -->
    <rect x="20" y="70" width="330" height="55" fill="#fff3e0" rx="8" stroke="#ffe0b2"/>
    <text x="185" y="103" text-anchor="middle" fill="#e65100" font-size="13" font-weight="600">Real-time: 2.8 km away | Est. fare: 32 CNY</text>
    <!-- Dialog overlay -->
    <rect x="50" y="160" width="270" height="130" fill="#fff" rx="12" stroke="#e0e0e0" stroke-width="2"/>
    <text x="185" y="195" text-anchor="middle" fill="#333" font-size="16" font-weight="700">System Notice</text>
    <line x1="70" y1="208" x2="300" y2="208" stroke="#eee"/>
    <text x="185" y="238" text-anchor="middle" fill="#555" font-size="14">Received passenger payment: 22.1 CNY</text>
    <rect x="120" y="252" width="130" height="30" fill="#4CAF93" rx="6"/>
    <text x="185" y="272" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Confirm</text>
    <!-- Accept button (background) -->
    <circle cx="185" cy="380" r="50" fill="#4CAF93" opacity="0.3"/>
    <circle cx="185" cy="380" r="45" fill="#43A087" opacity="0.3"/>
    <text x="185" y="387" text-anchor="middle" fill="#fff" font-size="18" font-weight="700" opacity="0.5">ACCEPT</text>
  </g>
</svg>
