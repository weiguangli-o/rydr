<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'Segoe UI', Roboto, Arial, sans-serif">
  <rect width="800" height="480" fill="#f5f5f5" rx="8"/>

  <!-- Passenger App -->
  <g transform="translate(20, 20)">
    <rect width="370" height="440" fill="#fff" rx="12" stroke="#e0e0e0"/>
    <rect width="370" height="50" fill="#4CAF93" rx="12 12 0 0"/>
    <rect y="38" width="370" height="12" fill="#4CAF93"/>
    <text x="185" y="32" text-anchor="middle" fill="#fff" font-size="16" font-weight="600">Online Taxi — Passenger</text>
    <!-- Map -->
    <rect x="15" y="60" width="340" height="240" fill="#e8f5e9" rx="6" stroke="#c8e6c9"/>
    <text x="185" y="140" text-anchor="middle" fill="#81c784" font-size="13">Map — Trip in Progress</text>
    <!-- Route line -->
    <line x1="100" y1="200" x2="300" y2="120" stroke="#4CAF93" stroke-width="3" stroke-dasharray="8,4"/>
    <!-- Car -->
    <rect x="160" y="155" width="50" height="24" fill="#FF9800" rx="4"/>
    <text x="185" y="171" text-anchor="middle" fill="#fff" font-size="10">Driver</text>
    <!-- Addresses -->
    <circle cx="30" cy="330" r="5" fill="#4CAF93"/>
    <text x="45" y="334" fill="#333" font-size="11">Wangjing West Rd, Chaoyang, Beijing</text>
    <circle cx="30" cy="355" r="5" fill="#f44336"/>
    <text x="45" y="359" fill="#333" font-size="11">Nanhu Zhongyuan #316, Bldg 3, Rm 301-07</text>
  </g>

  <!-- Driver App -->
  <g transform="translate(410, 20)">
    <rect width="370" height="440" fill="#fff" rx="12" stroke="#e0e0e0"/>
    <rect width="370" height="50" fill="#4CAF93" rx="12 12 0 0"/>
    <rect y="38" width="370" height="12" fill="#4CAF93"/>
    <text x="185" y="32" text-anchor="middle" fill="#fff" font-size="16" font-weight="600">Journey Started</text>
    <!-- Map -->
    <rect x="15" y="60" width="340" height="200" fill="#e8f5e9" rx="6" stroke="#c8e6c9"/>
    <text x="185" y="130" text-anchor="middle" fill="#81c784" font-size="13">Map — Navigating to Destination</text>
    <!-- Route -->
    <line x1="80" y1="180" x2="300" y2="100" stroke="#4CAF93" stroke-width="3" stroke-dasharray="8,4"/>
    <!-- Markers -->
    <rect x="70" y="185" width="120" height="22" fill="#2196F3" rx="4"/>
    <text x="130" y="200" text-anchor="middle" fill="#fff" font-size="10">Passenger Pickup</text>
    <rect x="240" y="80" width="120" height="22" fill="#f44336" rx="4"/>
    <text x="300" y="95" text-anchor="middle" fill="#fff" font-size="10">Passenger Dropoff</text>
    <!-- Addresses -->
    <circle cx="30" cy="290" r="5" fill="#4CAF93"/>
    <text x="45" y="294" fill="#333" font-size="11">Wangjing West Rd, Chaoyang, Beijing</text>
    <circle cx="30" cy="315" r="5" fill="#f44336"/>
    <text x="45" y="319" fill="#333" font-size="11">Nanhu Zhongyuan #316, Bldg 3, Rm 301-07</text>
    <!-- Action button -->
    <rect x="30" y="380" width="310" height="45" fill="#2196F3" rx="8"/>
    <text x="185" y="408" text-anchor="middle" fill="#fff" font-size="15" font-weight="600">Arrived at Destination</text>
  </g>
</svg>
