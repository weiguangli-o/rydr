<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'Segoe UI', Roboto, Arial, sans-serif">
  <rect width="800" height="480" fill="#f5f5f5" rx="8"/>

  <!-- Passenger App - Payment Dialog -->
  <g transform="translate(20, 20)">
    <rect width="370" height="440" fill="#fff" rx="12" stroke="#e0e0e0"/>
    <rect width="370" height="50" fill="#4CAF93" rx="12 12 0 0"/>
    <rect y="38" width="370" height="12" fill="#4CAF93"/>
    <text x="185" y="32" text-anchor="middle" fill="#fff" font-size="16" font-weight="600">Online Taxi — Passenger</text>
    <!-- Map (dimmed) -->
    <rect x="15" y="60" width="340" height="200" fill="#e8f5e9" rx="6" stroke="#c8e6c9" opacity="0.5"/>
    <!-- Dialog overlay -->
    <rect x="60" y="130" width="250" height="140" fill="#fff" rx="12" stroke="#e0e0e0" stroke-width="2"/>
    <text x="185" y="165" text-anchor="middle" fill="#333" font-size="16" font-weight="700">System Notice</text>
    <line x1="80" y1="178" x2="290" y2="178" stroke="#eee"/>
    <text x="185" y="208" text-anchor="middle" fill="#555" font-size="14">Your fare is 22.1 CNY</text>
    <rect x="110" y="225" width="140" height="35" fill="#4CAF93" rx="6"/>
    <text x="180" y="248" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Confirm</text>
  </g>

  <!-- Driver App - Bill Details -->
  <g transform="translate(410, 20)">
    <rect width="370" height="440" fill="#fff" rx="12" stroke="#e0e0e0"/>
    <rect width="370" height="50" fill="#4CAF93" rx="12 12 0 0"/>
    <rect y="38" width="370" height="12" fill="#4CAF93"/>
    <text x="185" y="32" text-anchor="middle" fill="#fff" font-size="16" font-weight="600">Confirm Bill</text>
    <!-- Trip summary -->
    <rect x="20" y="65" width="330" height="60" fill="#fafafa" rx="6" stroke="#eee"/>
    <text x="35" y="88" fill="#666" font-size="11">From: Wangjing West Rd, Chaoyang, Beijing</text>
    <text x="35" y="110" fill="#666" font-size="11">To: Nanhu Zhongyuan #316, Bldg 3, Rm 301-07</text>
    <!-- Total fare -->
    <text x="185" y="165" text-anchor="middle" fill="#4CAF93" font-size="36" font-weight="700">22.1 CNY</text>
    <!-- Fare breakdown -->
    <line x1="30" y1="185" x2="340" y2="185" stroke="#eee"/>
    <text x="35" y="210" fill="#333" font-size="13">Distance</text>
    <text x="335" y="210" text-anchor="end" fill="#555" font-size="13">8.8 km</text>
    <text x="35" y="235" fill="#333" font-size="13">Extra distance</text>
    <text x="335" y="235" text-anchor="end" fill="#555" font-size="13">0.8 km</text>
    <text x="35" y="260" fill="#333" font-size="13">Duration</text>
    <text x="335" y="260" text-anchor="end" fill="#555" font-size="13">28 min</text>
    <text x="35" y="285" fill="#333" font-size="13">Highway toll</text>
    <text x="335" y="285" text-anchor="end" fill="#999" font-size="13">—</text>
    <text x="35" y="310" fill="#333" font-size="13">Bridge toll</text>
    <text x="335" y="310" text-anchor="end" fill="#999" font-size="13">—</text>
    <text x="35" y="335" fill="#333" font-size="13">Parking fee</text>
    <text x="335" y="335" text-anchor="end" fill="#999" font-size="13">—</text>
    <line x1="30" y1="350" x2="340" y2="350" stroke="#eee"/>
    <!-- Collect payment button -->
    <rect x="30" y="380" width="310" height="45" fill="#4CAF93" rx="8"/>
    <text x="185" y="408" text-anchor="middle" fill="#fff" font-size="15" font-weight="600">Collect Payment</text>
  </g>
</svg>
